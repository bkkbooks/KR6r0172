body:
  text: 七佛偈毗婆尸佛過去莊嚴劫第九百九十八尊身從無相中受生猶如幻出諸形像幻人心識本來無罪福皆空無所住尸棄佛莊嚴劫第九百九十九尊起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性毗舍浮佛過去莊嚴劫第一千尊假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅拘留孫佛現在賢劫第一尊見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別拘那含牟尼佛賢劫第二尊佛不見身知是佛若是有知別無佛智者能知罪性空坦然不怖於生死迦葉佛賢劫第三尊一切眾生心清淨從本無生無可滅即此身心是幻生幻化之中無罪福釋迦牟尼佛賢劫第四尊法本法無法無法法亦法今付無法時法法何曾法三十三祖傳法偈摩訶迦葉天竺第一祖法法本來法無法無非法何於一法中有法有非法阿難天竺第二祖本來付有法付了言無法各各須自悟悟了無無法商那和修天竺第三祖非法亦非心無心亦無法說是心法時是法非心法優婆毱多天竺第四祖心自本來心本心非有法有法有本心非心非本法提多迦天竺第五祖通達本心法無法無非法悟了同未悟無心亦無法彌遮迦天竺第六祖無心無可得說得不名法若了心非心始了心心法婆須蜜天竺第七祖心同虗空界示等虗空法證得虗空時無是無非法佛陀難提天竺第八祖虗空無內外心法亦如此若了虗空故是達真如理伏䭾蜜多天竺第九祖真理不無名因名顯真理受得真實法非真亦非偽脇尊者天竺第十祖真體自然真因真說有理領得真真法無行亦無止富那夜奢第十一祖迷悟如隱顯明暗不相離今付隱顯法非一亦非二馬鳴大士第十二祖隱顯即本法明暗元不二今付悟了法非取亦非離迦毗摩羅第十三祖非隱非顯法說是真實際悟此隱顯法非愚亦非智龍樹尊者第十四祖為明隱顯法方說解脫理於法心不證無瞋亦無喜迦那提婆第十五祖本對傳法人為說解脫理於法實無證無終亦無始羅睺羅多第十六祖於法實無證不取亦不離法非有無相內外云何起僧迦難提第十七祖心地本無生因地從緣起緣種不相妨華果亦復爾伽耶舍多第十八祖有種有心地因緣能發萌於緣不相礙當生生不生鳩摩羅多第十九祖性上本無生為對求人說於法既無得何懷決不決闍夜多第二十祖言下合無生同於法界性若能如是解通達事理境婆修盤頭第二十一祖泡幻同無礙如何不了悟達法在其中非今亦非古摩拏羅第二十二祖心隨萬境轉轉處實能幽隨流認得性無喜復無憂鶴勒那第二十三祖認得心性時可說不思議了了無可得得時不說知師子比丘第二十四祖正說知見時知見俱是心當心即知見知見即於今婆舍斯多第二十五祖聖人說知見當境無是非我今悟真性無道亦無理不如密多第二十六祖真性心地藏無頭亦無尾應緣而化物方便呼為智般若多羅第二十七祖心地生諸種因事復生理果滿菩提圓華開世界起菩提達磨西天第二十八祖中華初祖吾本來茲土傳法救迷情一華開五葉結果自然成慧可大師第二十九祖中華二祖本來緣有地因地種華生本來無有種華亦不曾生僧璨大師第三十祖中華三祖華種雖因地從地種華生若無人下種華地盡無生道信大師第三十一祖中華四祖華種有生性因地華生生大緣與信合當生生不生弘忍大師第三十二祖中華五祖有情來下種因地果還生無情既無種無性亦無生慧能大師第三十三祖中華六祖心地含諸種普雨悉皆生頓悟華情已菩提果自成佛祖源流訣迦文迦葉阿難商優波毱多與提多彌迦婆須佛䭾伏脇富馬鳴迦毗摩龍樹迦那於羅睺僧伽伽耶鳩摩羅闍夜婆修摩拏鶴師子婆舍不如般達磨傳於東土後慧僧道弘慧之他五宗次序譜六祖能第一南嶽讓馬祖一百丈海五世溈山祐六世仰山寂黃檗運六世臨濟玄青原思石頭遷藥山儼雲巖晟六世洞山价雲居膺七世曹山寂天皇悟龍潭信德山鑑雪峰存八世雲門偃玄沙備地藏琛十世法眼益
